name: nventory
description: "Premium inventory and workforce management app with Material Design 3."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Routing
  go_router: ^14.8.1
  # Icons
  cupertino_icons: ^1.0.8
  # UUID generation
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code generation for Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
